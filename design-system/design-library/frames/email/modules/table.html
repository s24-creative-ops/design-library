<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    </style>
  </head>
  <body>
    <div class="library-frame-root">
<!-- MODULE: table | SNIPPET: emb_table -->
<section class="module theme-white" data-module="table" data-snippet="emb_table">
  <div class="module__inner">
    <div class="table-card">
      <div class="module__head">
        <h2 class="module__title module__title--medium" data-export-field="emb_table_headline" data-export-role="headline">Leistungsueberblick fuer Ihre Vermarktung</h2>
      </div>
      <table class="data-table" role="presentation">
        <thead>
          <tr>
            <th scope="col" data-export-field="emb_table_col_1_headline">Leistung</th>
            <th scope="col" data-export-field="emb_table_col_2_headline">Basis</th>
            <th scope="col" data-export-field="emb_table_col_3_headline">Plus</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-export-field="emb_table_row_1_col_1_body">Expose und Inserat</td>
            <td data-export-field="emb_table_row_1_col_2_body">Enthalten</td>
            <td data-export-field="emb_table_row_1_col_3_body">Enthalten</td>
          </tr>
          <tr>
            <td data-export-field="emb_table_row_2_col_1_body">Rueckmeldungen zentral buendeln</td>
            <td data-export-field="emb_table_row_2_col_2_body">Begrenzt</td>
            <td data-export-field="emb_table_row_2_col_3_body">Voll integriert</td>
          </tr>
          <tr>
            <td data-export-field="emb_table_row_3_col_1_body">Persoenliche Begleitung</td>
            <td data-export-field="emb_table_row_3_col_2_body">Optional</td>

          </tr>
        </tbody>
      </table>
      <div class="module__cta-row">
        <a class="button-outline-strong" href="https://www.immobilienscout24.de" target="_blank" rel="noreferrer" data-token-attr-href="links.default_cta" data-export-field="emb_table_button_label" data-export-url-field="emb_table_button_url" data-export-role="cta">Pakete vergleichen</a>
      </div>
    </div>
  </div>
</section>
<script src="../token-runtime.js" defer></script>

    </div>
  <script>
(function(){
  function getHeight(){
    var body=document.body;
    var root=document.documentElement;
    return Math.max(
      body ? body.scrollHeight : 0,
      body ? body.offsetHeight : 0,
      root ? root.clientHeight : 0,
      root ? root.scrollHeight : 0,
      root ? root.offsetHeight : 0
    );
  }
  function postHeight(){
    try {
      window.parent.postMessage({ type: "component-library:frame-height", height: getHeight() }, "*");
    } catch (error) {}
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", postHeight);
  } else {
    postHeight();
  }
  window.addEventListener("load", postHeight);
  window.addEventListener("resize", postHeight);
  window.addEventListener("message", function(event){
    if (event.data && event.data.type === "component-library:request-height") {
      postHeight();
    }
  });
  if (typeof ResizeObserver !== "undefined") {
    var observer = new ResizeObserver(postHeight);
    if (document.body) observer.observe(document.body);
    if (document.documentElement) observer.observe(document.documentElement);
  }
  setTimeout(postHeight, 0);
  setTimeout(postHeight, 120);
  setTimeout(postHeight, 320);
})();
</script>
</body>
</html>
