<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>logo-centered</title>
    <link rel="stylesheet" href="../../../../../email-builder/agent/preview-styles.css" />
    <style>
      html, body { margin: 0; padding: 0; background: transparent; }
      body { min-width: 0; }
      .library-frame-root { padding: 0; }
    </style>
  </head>
  <body>
    <div class="library-frame-root">
<!-- MODULE: logo-centered | SNIPPET: emb_logo_centered -->
<section class="module theme-white" data-module="logo-centered" data-snippet="emb_logo_centered">
  <div class="module__inner module__inner--logo module__inner--logo-centered">
    <a
      class="module__logo-link"
      href="https://www.immobilienscout24.de/"
      title="ImmoScout24"
      data-token-attr-href="links.website"
      data-token-attr-title="logo.default.title"
    >
      <img
        class="module__logo-image"
        src="https://www.static-immobilienscout24.de/fro/ite/_/IS24-Logo_horizontal_left_white.png"
        alt="Logo ImmoScout24"
        width="185"
        height="47"
        data-token-attr-src="logo.default.src"
        data-token-attr-alt="logo.default.alt"
        data-token-attr-width="logo.default.width"
        data-token-attr-height="logo.default.height"
      />
    </a>
  </div>
</section>
<script src="../token-runtime.js" defer></script>

    </div>
  <script>
(function(){
  function getHeight(){
    var body=document.body;
    var root=document.documentElement;
    return Math.max(
      body ? body.scrollHeight : 0,
      body ? body.offsetHeight : 0,
      root ? root.clientHeight : 0,
      root ? root.scrollHeight : 0,
      root ? root.offsetHeight : 0
    );
  }
  function postHeight(){
    try {
      window.parent.postMessage({ type: "component-library:frame-height", height: getHeight() }, "*");
    } catch (error) {}
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", postHeight);
  } else {
    postHeight();
  }
  window.addEventListener("load", postHeight);
  window.addEventListener("resize", postHeight);
  window.addEventListener("message", function(event){
    if (event.data && event.data.type === "component-library:request-height") {
      postHeight();
    }
  });
  if (typeof ResizeObserver !== "undefined") {
    var observer = new ResizeObserver(postHeight);
    if (document.body) observer.observe(document.body);
    if (document.documentElement) observer.observe(document.documentElement);
  }
  setTimeout(postHeight, 0);
  setTimeout(postHeight, 120);
  setTimeout(postHeight, 320);
})();
</script>
</body>
</html>
